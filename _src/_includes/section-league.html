<section class="around-the-league">
    <div class="content--wrap">
        <h2>Around the league</h2>
        <ul class="squads">
            <li class="club club--afi">
                <a href="https://www.americanfootball.ie/" style="background-image: url('/assets/afi-logos/afi.png');"
                    title="American Football Ireland">
                </a>
            </li>
            {% for club in afiClubs.all %}
            <li class="club club--{{ club.id }}">
                <a href="{{ club.url }}" style="background-image: url('/assets/afi-logos/{{ club.id }}.png');"
                    title="{{ club.name }}">
                </a>
            </li>
            {% endfor %}
        </ul>
    </div>
</section>
